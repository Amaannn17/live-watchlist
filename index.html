<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Market Watchlist</title>
    <style>
        :root {
            --bg-matte: #121212; --surface-matte: #1e1e1e; --text-main: #e0e0e0;
            --text-muted: #888888; --accent-green: #00c853; --accent-red: #ff3d00;
            --accent-warning: #ffb300; --border-color: #333333; --card-bg: #252525;
        }

        body { background-color: var(--bg-matte); color: var(--text-main); font-family: -apple-system, sans-serif; margin: 0; padding: 40px 20px; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        .dashboard-container { width: 100%; max-width: 1200px; display: flex; flex-direction: column; gap: 25px; }

        .header-panel { background-color: var(--surface-matte); padding: 20px; border-radius: 8px; border: 1px solid var(--border-color); display: flex; justify-content: space-between; align-items: center; }
        h1 { margin: 0; font-size: 1.2rem; font-weight: 500; color: var(--text-muted); }
        .status-indicator { font-size: 0.9rem; color: var(--accent-green); display: flex; align-items: center; gap: 8px; }
        .dot { height: 8px; width: 8px; background-color: var(--accent-green); border-radius: 50%; box-shadow: 0 0 8px var(--accent-green); }

        .sync-flash { animation: pulse 1.5s ease-out; }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(0,200,83,0.7); } 70% { box-shadow: 0 0 0 10px rgba(0,200,83,0); } 100% { box-shadow: 0 0 0 0 rgba(0,200,83,0); } }

        .controls { display: flex; gap: 15px; background-color: var(--surface-matte); padding: 20px; border-radius: 8px; border: 1px solid var(--border-color); align-items: center; }
        input, button { background-color: var(--bg-matte); color: var(--text-main); border: 1px solid var(--border-color); padding: 10px 15px; border-radius: 4px; outline: none; font-size: 1rem; }
        button { cursor: pointer; background-color: #333333; font-weight: bold; transition: background 0.2s; }
        button:hover { background-color: #444444; }
        button:disabled { opacity: 0.5; cursor: not-allowed; }

        .watchlist-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 20px; width: 100%; }
        .stock-card { background-color: var(--surface-matte); border: 1px solid var(--border-color); border-radius: 8px; padding: 25px; display: flex; flex-direction: column; gap: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.3); position: relative; }

        .card-header { display: flex; justify-content: space-between; align-items: center; font-size: 1.4rem; font-weight: bold; }
        .price { font-size: 2.2rem; font-weight: 300; letter-spacing: -0.5px; }
        .pnl { font-size: 1rem; font-weight: 500; }

        .positive { color: var(--accent-green); } .negative { color: var(--accent-red); } .error-text { color: var(--accent-warning); font-size: 1rem; }
        .log-section { margin-top: 5px; font-size: 0.9rem; color: var(--text-muted); border-top: 1px solid var(--border-color); padding-top: 15px; }

        .manual-logs-container { margin-top: 10px; background-color: var(--card-bg); border-radius: 6px; padding: 12px; border: 1px solid var(--border-color); }
        .logs-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
        .logs-title { font-size: 0.8rem; font-weight: bold; color: #aaa; text-transform: uppercase; }

        .snapshot-btn { background-color: var(--bg-matte); border: 1px solid var(--border-color); color: var(--text-main); font-size: 0.8rem; padding: 4px 8px; border-radius: 4px; cursor: pointer; }
        .snapshot-btn:hover { border-color: var(--accent-green); color: var(--accent-green); }

        .log-pill { display: flex; flex-direction: column; gap: 4px; background-color: var(--bg-matte); padding: 8px 10px; border-radius: 4px; margin-bottom: 5px; border: 1px solid #2a2a2a; }
        .log-pill-top { display: flex; justify-content: space-between; align-items: center; font-size: 0.95rem; }
        .log-pill-bottom { font-size: 0.75rem; color: #888; }
        .log-pill:last-child { margin-bottom: 0; }

        .diff-text { font-size: 0.85rem; font-weight: bold; }
        .baseline-badge { background: var(--accent-green); color: #000; padding: 2px 5px; border-radius: 3px; font-size: 0.6rem; margin-left: 6px; font-weight: bold; letter-spacing: 0.5px;}
        .delete-btn { background: none; border: none; color: var(--text-muted); font-size: 1.2rem; cursor: pointer; padding: 0; margin-left: 10px; transition: color 0.2s; }
        .delete-btn:hover { color: var(--accent-red); }
        .header-right { display: flex; align-items: center; }
        .loader { text-align: center; color: var(--text-muted); grid-column: 1 / -1; padding: 40px; }
    </style>
</head>
<body>

<div class="dashboard-container">
    <div class="header-panel">
        <h1>Live Market Dashboard</h1>
        <div class="status-indicator"><span class="dot" id="syncDot"></span> Active (30s Polling)</div>
    </div>

    <div class="controls">
        <input type="text" id="tickerInput" placeholder="Ticker (e.g. TSLA)">
        <button onclick="addStockToSheet()" id="addBtn">Add Stock</button>
    </div>

    <div class="watchlist-grid" id="watchlistGrid">
        <div class="loader" id="loaderText">Fetching live JSON data...</div>
    </div>
</div>

<script>
    const APP_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbx6ujxBp3ha-RvI9XU4BntaZwgEHG3Y8JliDQXODvo7gow_EAnxzQ3JLbX1lyw2WJ-U/exec';
    const UPDATE_INTERVAL_SECONDS = 30;

    function triggerSyncPulse() {
        const dot = document.getElementById('syncDot');
        dot.classList.remove('sync-flash');
        void dot.offsetWidth;
        dot.classList.add('sync-flash');
    }

    async function addStockToSheet() {
        const input = document.getElementById('tickerInput');
        const btn = document.getElementById('addBtn');
        const ticker = input.value.trim();
        if (!ticker) return;

        btn.innerText = 'Adding...'; btn.disabled = true;
        try {
            await fetch(`${APP_SCRIPT_URL}?action=add&ticker=${encodeURIComponent(ticker)}`);
            input.value = '';
            setTimeout(fetchSheetData, 1000);
        } catch (error) { alert("Error adding stock."); }
        finally { btn.innerText = 'Add Stock'; btn.disabled = false; }
    }

    async function logCurrentPrice(ticker, btnElement) {
        btnElement.innerText = 'Saving...'; btnElement.disabled = true;
        try {
            await fetch(`${APP_SCRIPT_URL}?action=log&ticker=${encodeURIComponent(ticker)}`);
            setTimeout(fetchSheetData, 1000);
        } catch (error) {
            alert("Error logging price."); btnElement.innerText = 'Snapshot'; btnElement.disabled = false;
        }
    }

    async function deleteStockFromSheet(ticker, btnElement) {
        if (!confirm(`Are you sure you want to delete ${ticker}?`)) return;
        btnElement.disabled = true; btnElement.style.color = '#ff3d00';
        try {
            await fetch(`${APP_SCRIPT_URL}?action=delete&ticker=${encodeURIComponent(ticker)}`);
            setTimeout(fetchSheetData, 1000);
        } catch (error) { alert("Error deleting."); btnElement.disabled = false; }
    }

    async function fetchSheetData() {
        try {
            triggerSyncPulse();
            const response = await fetch(`${APP_SCRIPT_URL}?action=read&t=${new Date().getTime()}`);
            if (!response.ok) throw new Error("Network error");
            const jsonData = await response.json();
            processJSON(jsonData);
        } catch (error) {
            const loader = document.getElementById('loaderText');
            if(loader) loader.innerText = 'Failed to connect. Retrying...';
        }
    }

    function processJSON(dataRows) {
        const grid = document.getElementById('watchlistGrid');
        if (!dataRows || dataRows.length === 0) {
            grid.innerHTML = '<div class="loader" id="loaderText">No stocks found.</div>';
            return;
        }

        const loader = document.getElementById('loaderText');
        if (loader) loader.remove();

        const activeTickers = new Set();

        dataRows.forEach(row => {
            const ticker = row.ticker;
            const safeTickerId = ticker.replace(/[^a-zA-Z0-9]/g, '-');
            activeTickers.add(safeTickerId);

            const rawPrice = (row.price || '').toString();
            const rawInvested = (row.invested || '').toString();
            const rawHistorical = (row.historical || '').toString();
            const rawPnl = (row.pnl || '').toString();
            const manualLogs = row.manualLogs || [];

            const hasError = [rawPrice, rawInvested, rawHistorical, rawPnl].some(val =>
                val.includes('#N/A') || val.includes('#VALUE!') || val.includes('#REF!')
            );

            createOrUpdateCard(ticker, safeTickerId, rawPrice, rawInvested, rawHistorical, rawPnl, manualLogs, hasError);
        });

        Array.from(grid.children).forEach(child => {
            if (child.classList.contains('stock-card')) {
                const childId = child.id.replace('card-', '');
                if (!activeTickers.has(childId)) grid.removeChild(child);
            }
        });
    }

    function createOrUpdateCard(ticker, safeTickerId, rawPrice, rawInvested, rawHistorical, rawPnl, manualLogs, hasError) {
        const grid = document.getElementById('watchlistGrid');
        let card = document.getElementById(`card-${safeTickerId}`);
        let isNewCard = false;

        if (!card) {
            card = document.createElement('div');
            card.className = 'stock-card';
            card.id = `card-${safeTickerId}`;
            isNewCard = true;
        }

        const deleteHTML = `<button class="delete-btn" onclick="deleteStockFromSheet('${ticker}', this)" title="Delete ${ticker}">✖</button>`;

        let logsHTML = `<div class="manual-logs-container">
                            <div class="logs-header">
                                <span class="logs-title">Checkpoints (Max 10)</span>
                                <button class="snapshot-btn" onclick="logCurrentPrice('${ticker}', this)">Snapshot</button>
                            </div>`;

        if (manualLogs.length > 0) {
            manualLogs.forEach((logStr, index) => {
                const parts = logStr.split('|');
                const currentVal = parseFloat(parts[0]);
                const dateStr = parts[1] || 'Legacy Data';

                let diffSpan = '';
                if (index > 0) {
                    const prevParts = manualLogs[index - 1].split('|');
                    const prevVal = parseFloat(prevParts[0]);
                    const diff = currentVal - prevVal;
                    if (!isNaN(diff)) {
                        const isPos = diff >= 0;
                        const sign = isPos ? '+' : '';
                        const colorClass = isPos ? 'positive' : 'negative';
                        diffSpan = `<span class="diff-text ${colorClass}">(${sign}$${Math.abs(diff).toFixed(2)})</span>`;
                    }
                }

                const badge = index === 0 ? `<span class="baseline-badge">BASELINE</span>` : '';
                logsHTML += `
                    <div class="log-pill">
                        <div class="log-pill-top">
                            <div><span style="font-weight:bold;">$${currentVal.toFixed(2)}</span>${badge}</div>
                            ${diffSpan}
                        </div>
                        <div class="log-pill-bottom">${dateStr}</div>
                    </div>`;
            });
        } else {
            logsHTML += `<div class="log-pill" style="color: #666; justify-content: center;">No snapshots yet</div>`;
        }
        logsHTML += `</div>`;

        let newInnerHTML = '';
        const invested = parseFloat(rawInvested.replace(/[^0-9.-]+/g,""));
        const safeInvested = isNaN(invested) ? '100.00' : invested.toFixed(2);

        if (hasError) {
            // Error State: explicitly hardcodes the P&L ($100.00) label to never vanish
            newInnerHTML = `
                <div class="card-header">
                    <span>${ticker}</span>
                    <div class="header-right"><span style="font-size:0.8rem; color:var(--accent-warning);">Loading...</span>${deleteHTML}</div>
                </div>
                <div class="price error-text" style="font-size: 1.5rem;">Connecting...</div>
                <div class="pnl error-text">P&L ($${safeInvested}): Awaiting data</div>
                <div class="log-section" style="color:var(--accent-warning);">Auto-Repairing old spreadsheet formulas...</div>
                ${logsHTML}
            `;
        } else {
            // Normal State
            const livePrice = parseFloat(rawPrice.replace(/[^0-9.-]+/g,""));
            const historicalPrice = parseFloat(rawHistorical.replace(/[^0-9.-]+/g,""));
            const profitLoss = parseFloat(rawPnl.replace(/[^0-9.-]+/g,""));

            const safePrice = isNaN(livePrice) ? '<span style="font-size: 1.5rem; color: #888;">Updating...</span>' : `$${livePrice.toFixed(2)}`;

            let safePnl = '...';
            let pnlClass = '';
            if (!isNaN(profitLoss)) {
                const isPositive = profitLoss >= 0;
                pnlClass = isPositive ? 'positive' : 'negative';
                safePnl = `${isPositive ? '+' : '-'}$${Math.abs(profitLoss).toFixed(2)}`;
            }
            const safeHistorical = isNaN(historicalPrice) ? '...' : `$${historicalPrice.toFixed(2)}`;

            newInnerHTML = `
                <div class="card-header">
                    <span>${ticker}</span>
                    <div class="header-right"><span style="font-size:0.8rem; color:var(--text-muted); font-weight:normal;">Live</span>${deleteHTML}</div>
                </div>
                <div class="price">${safePrice}</div>
                <div class="pnl ${pnlClass}">P&L ($${safeInvested}): ${safePnl}</div>
                <div class="log-section">Initial Price (Baseline): ${safeHistorical}</div>
                ${logsHTML}
            `;
        }

        // ⚡ Bolt: Cache generated raw HTML string in _rawHtml to avoid unreliable innerHTML string equality checks and prevent unnecessary DOM updates.
        if (card._rawHtml !== newInnerHTML) {
            card.innerHTML = newInnerHTML;
            card._rawHtml = newInnerHTML;
        }
        if (isNewCard) grid.appendChild(card);
    }

    fetchSheetData();
    setInterval(fetchSheetData, UPDATE_INTERVAL_SECONDS * 1000);
</script>
</body>
</html>
